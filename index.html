<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculador Kilos Cartón</title>


<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 350px;
    }

    h1 {
        font-size: 18px;
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 48%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-calcular {
        background-color: #007bff;
        color: white;
    }

    .btn-limpiar {
        background-color: #6c757d;
        color: white;
    }

    .resultado {
        margin-top: 20px;
        font-size: 18px;
        text-align: center;
    }

    .botones {
        display: flex;
        justify-content: space-between;
    }
</style>


</head>
<body>

<div class="container">


<h1>CALCULADOR KILOS CARTÓN</h1>

<label>Cantidad de Cajas:</label>
<input type="number" id="cantidad">

<label>Material:</label>
<select id="material"></select>

<label>Corte A:</label>
<input type="number" id="corteA">

<label>Corte B:</label>
<input type="number" id="corteB">

<label>Cabida:</label>
<input type="number" id="cabida">

<div class="botones">
    <button class="btn-calcular" onclick="calcular()">Calcular</button>
    <button class="btn-limpiar" onclick="limpiar()">Limpiar</button>
</div>

<div class="resultado">
    Total Kilos: <span id="resultado">0</span>
</div>


</div>

<script src="script.js"></script>

</body>
</html>
